name: Build and Release Skins Pro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate skin list
        run: node scripts/build-skins.cjs

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Detect version change
        id: version
        run: |
          NEW_VER=$(jq -r '.version' package.json)
          OLD_VER=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
          echo "new=$NEW_VER" >> "$GITHUB_OUTPUT"
          if [ -n "$OLD_VER" ] && [ "$NEW_VER" != "$OLD_VER" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dist assets
        if: steps.version.outputs.changed == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build dist assets [skip ci]"
          git push

      - name: Tag and release
        if: steps.version.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build v${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin --tags
          git push

      - name: Create Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.new }}
          body: |
            # Skins Pro v${{ steps.version.outputs.new }}

            ## Installation via HACS
            1. Open HACS → Frontend → Custom repositories
            2. Add: `https://github.com/Desmond-Dong/Skins-Pro`
            3. Category: **Dashboard**
            4. Search for "Skins Pro" and install
            5. Clear browser cache and refresh (Ctrl+Shift+R / Cmd+Shift+R)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
