name: Build and Release Skins Pro

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check release conditions
        id: check
        run: |
          IS_MERGE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IS_MERGE=true
          else
            PARENT_COUNT=$(git rev-list --parents -1 HEAD | wc -w)
            [ "$PARENT_COUNT" -gt 2 ] && IS_MERGE=true
          fi

          NEW_VER=$(jq -r '.version' package.json)
          OLD_VER=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
          VER_CHANGED=false
          if [ -n "$OLD_VER" ] && [ "$NEW_VER" != "$OLD_VER" ]; then
            VER_CHANGED=true
          elif ! git rev-parse "v$NEW_VER" >/dev/null 2>&1; then
            VER_CHANGED=true
          fi

          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VER_CHANGED" >> "$GITHUB_OUTPUT"

          # Every fork push must publish matching dist and store assets so HACS
          # installations never lag behind the source commit.
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Type check
        if: steps.check.outputs.skip != 'true'
        run: npm run type-check

      - name: Commit dist to master
        if: steps.check.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f dist/
          if ! git diff --staged --quiet; then
            git commit -m "chore: build dist assets [skip ci]"
          fi

      - name: Generate changelog
        if: steps.check.outputs.version_changed == 'true'
        id: changelog
        uses: Desmond-Dong/actions/bilingual-changelog@main
        with:
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          llm-api-url: ${{ secrets.LLM_API_URL }}
          llm-model: ${{ secrets.LLM_MODEL }}

      - name: Tag version
        if: steps.check.outputs.version_changed == 'true'
        run: |
          git tag "v${{ steps.check.outputs.version }}"

      - name: Push master (including tags)
        if: steps.check.outputs.skip != 'true'
        run: |
          git push origin --tags
          git push

      - name: Create Release
        if: steps.check.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.check.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push store assets to store branch
        if: steps.check.outputs.skip != 'true'
        run: |
          STORE_DIR="$(mktemp -d)"
          mv store/*.zip "$STORE_DIR/"
          mv screenshots/thumbnails "$STORE_DIR/thumbnails"
          mv screenshots/registry.json "$STORE_DIR/registry.json"

          git checkout --orphan _store_push
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

          mkdir -p store screenshots/thumbnails
          mv "$STORE_DIR"/*.zip store/
          mv "$STORE_DIR/thumbnails"/* screenshots/thumbnails/
          mv "$STORE_DIR/registry.json" screenshots/registry.json

          printf '%s\n' '# Skins Pro — Store Assets' '' 'This branch contains build artifacts for the skin store.' 'Pushed automatically by CI. Do not edit manually.' > README.md
          git add .
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Update store artifacts [skip ci]" --allow-empty
          git push origin _store_push:store --force

          git checkout "${{ github.ref_name }}"

      - name: Purge jsdelivr cache
        if: steps.check.outputs.skip != 'true'
        run: curl -s https://purge.jsdelivr.net/gh/zhouningha/znSkins-Pro@store/screenshots/registry.json
