<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>玻璃拟态智能家居 · 首页预览</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    html, body { margin: 0; padding: 24px; background: #eef1f8; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .preview-root {
      display: block; width: 1440px; margin: 0 auto;
      --sp-device-yellow:rgba(255, 179, 71, 0.42); --sp-device-green:rgba(168, 214, 196, 0.42); --sp-device-blue:rgba(184, 212, 240, 0.48); --sp-device-purple:rgba(210, 196, 232, 0.48); --sp-device-red:rgba(232, 213, 242, 0.48); --sp-device-brown:rgba(255, 205, 178, 0.42);
      --sp-device-bg:rgba(184, 212, 240, 0.08); --sp-scene-morning:rgba(232, 213, 242, 0.16); --sp-scene-night:rgba(184, 212, 240, 0.16); --sp-scene-movie:rgba(255, 179, 71, 0.18); --sp-scene-game:rgba(232, 213, 242, 0.12);
      --sp-item-icon-bg:rgba(255,255,255,.65); --sp-time-icon-bg:rgba(232, 213, 242, 0.14); --sp-env-temp-bg:rgba(232, 213, 242, 0.14); --sp-env-hum-bg:rgba(184, 212, 240, 0.14); --sp-env-pm-bg:rgba(255, 179, 71, 0.16);
      --sp-switch-bg:rgba(45, 55, 72, 0.12); --sp-maintenance-divider:rgba(45, 55, 72, 0.08); --sp-camera-bg:rgba(184, 212, 240, 0.08);
      --sp-sidebar-width:200px; --sp-app-padding:16px; --sp-stage-radius:24px; --sp-runtime-height:720px; --sp-runtime-min-height:720px;
      --sp-glass-bg:rgba(255,255,255,0.38); --sp-panel-bg:rgba(255,255,255,0.32);
      --sp-base-texture:url("base-texture.jpg"); --sp-stage-texture:url("stage-background.jpg");
      --sp-stage-hero:url("hero-glass-house.png");
      --sp-app-overlay:linear-gradient(135deg, #eef2f8 0%, #f3e8f8 48%, #fdeee6 100%); --sp-stage-overlay:linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(232,213,242,0.14) 45%, rgba(184,212,240,0.18) 100%);
      --sp-room-overlay:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.38));
      --sp-bar-gradient:linear-gradient(90deg, rgba(184, 212, 240, 0.35), #E8D5F2, #FFB347);
      --sp-text-primary:#2D3748; --sp-text-main:var(--sp-text-primary); --sp-text-muted:rgba(45, 55, 72, 0.62); --sp-text-muted-dim:rgba(45, 55, 72, 0.48);
      --sp-text-muted-bright:rgba(45, 55, 72, 0.78); --sp-text-alt:#B8D4F0; --sp-text-dark:#2D3748; --sp-text-dark-dim:rgba(45, 55, 72, 0.72); --sp-text-dark-alpha:rgba(45, 55, 72, 0.1); --sp-text-down:#E8D5F2;
      --sp-accent:#E8D5F2; --sp-accent-alpha:rgba(232, 213, 242, 0.14); --sp-accent-active:rgba(232, 213, 242, 0.22); --sp-accent-border:rgba(232, 213, 242, 0.34); --sp-accent-red:#E8D5F2; --sp-accent-blue:#B8D4F0;
      --sp-border-width:1px; --sp-border-muted:rgba(45, 55, 72, 0.1); --sp-border-glass:rgba(255, 255, 255, 0.58); --sp-border-weather:rgba(255, 255, 255, 0.42); --sp-border-device:rgba(45, 55, 72, 0.08); --sp-border-empty:rgba(30,34,53,.10); --sp-border-chip:rgba(45, 55, 72, 0.1);
      --sp-shadow-sm:0 8px 32px rgba(30,34,53,.07); --sp-shadow-md:0 12px 40px rgba(30,34,53,.09); --sp-shadow-lg:0 20px 60px rgba(30,34,53,.10); --sp-shadow-xl:0 16px 48px rgba(30,34,53,.09);
      --sp-shadow-card:0 12px 36px rgba(30,34,53,.05); --sp-shadow-glass:0 10px 40px rgba(30,34,53,.07); --sp-shadow-scene:0 8px 24px rgba(30,34,53,.05); --sp-shadow-device:0 6px 20px rgba(30,34,53,.04); --sp-shadow-switch:0 2px 8px rgba(0,0,0,.07);
      --sp-radius-pill:999px; --sp-radius-xl:20px; --sp-radius-lg:18px; --sp-radius-md:14px; --sp-radius-sm:10px; --sp-radius-xs:8px; --sp-radius-weather:10px;
      --sp-radius-icon:14px; --sp-radius-sidebar:14px; --sp-radius-room:18px; --sp-radius-device:16px; --sp-radius-camera:18px; --sp-radius-scene:14px; --sp-radius-glass:18px; --sp-radius-time:12px;
      --sp-font-xxl:32px; --sp-font-xl:28px; --sp-font-lg:22px; --sp-font-md:15px; --sp-font-sm:14px; --sp-font-xs:13px; --sp-font-2xs:12px; --sp-font-3xs:11px; --sp-font-4xs:10px;
      --sp-space-xl:24px; --sp-space-lg:16px; --sp-space-md:12px; --sp-space-sm:10px; --sp-space-xs:8px; --sp-space-2xs:6px; --sp-space-3xs:4px;
      --sp-device-unavailable:rgba(200,200,210,.80); --sp-env-temp:#E8D5F2; --sp-env-hum:#B8D4F0; --sp-env-pm:#FFB347;
      --sp-warning:#d4a050; --sp-error:#c88078; --sp-switch-knob:linear-gradient(145deg, #FFFFFF, #FFB347 45%, #E8D5F2); --sp-bar-min:12px;
      --sp-glass-light:rgba(255,255,255,0.46); --sp-glass-dim:rgba(255,255,255,0.30); --sp-scrollbar-track:rgba(45, 55, 72, 0.05); --sp-scrollbar-thumb:rgba(45, 55, 72, 0.14); --sp-weather-bg:rgba(184, 212, 240, 0.12);
    }
    .icon { width: 18px; height: 18px; display: inline-block; opacity: .85; }
  </style>
</head>
<body>
  <div class="preview-root">
    <div class="mc-app" data-view="home">
      <aside class="sidebar">
        <div class="profile">
          <img class="profile-img" src="avatar-steve.jpg" alt="James" />
          <div>
            <h3>James</h3>
            <p class="muted">玻璃拟态智能家居 · 中控</p>
          </div>
        </div>
        <nav class="menu">
          <button class="nav-button active"><span class="icon">⌂</span> 首页</button>
          <button class="nav-button"><span class="icon">⚡</span> 能源</button>
          <button class="nav-button"><span class="icon">▣</span> 设备</button>
          <button class="nav-button"><span class="icon">◎</span> 场景</button>
          <button class="nav-button"><span class="icon">⌁</span> 自动化</button>
          <button class="nav-button"><span class="icon">⌂</span> 房间</button>
          <button class="nav-button"><span class="icon">◉</span> 安全</button>
        </nav>
        <div class="sidebar-art"><img src="decor-wolf-lantern.jpg" alt="装饰" /></div>
      </aside>

      <main class="stage">
        <div class="stage-grid">
          <div class="welcome-group">
            <section class="welcome">
              <h1>欢迎回到玻璃拟态智能家居！</h1>
              <p class="quote">让家更聪明，让生活更轻松。</p>
            </section>
            <div class="weather-block">
              <div class="weather-current">
                <div class="weather-state-icon">☀</div>
                <div class="weather-current-info">
                  <div class="weather-current-temp">19°C</div>
                  <div class="weather-current-hl">12° / 24°</div>
                  <div class="weather-current-cond">晴 · 微风</div>
                </div>
              </div>
              <div class="weather-forecast">
                <div class="forecast-day"><span class="forecast-weekday">周一</span><span class="forecast-icon">☀</span><span class="forecast-high">22°</span><span class="forecast-low">14°</span></div>
                <div class="forecast-day"><span class="forecast-weekday">周二</span><span class="forecast-icon">⛅</span><span class="forecast-high">20°</span><span class="forecast-low">13°</span></div>
                <div class="forecast-day"><span class="forecast-weekday">周三</span><span class="forecast-icon">☁</span><span class="forecast-high">18°</span><span class="forecast-low">12°</span></div>
                <div class="forecast-day"><span class="forecast-weekday">周四</span><span class="forecast-icon">🌧</span><span class="forecast-high">16°</span><span class="forecast-low">11°</span></div>
                <div class="forecast-day"><span class="forecast-weekday">周五</span><span class="forecast-icon">☀</span><span class="forecast-high">21°</span><span class="forecast-low">13°</span></div>
              </div>
            </div>
          </div>

          <section class="bottom-stack">
            <section class="bottom-block bottom-devices">
              <div class="section-title"><h2>设备</h2><p class="muted">快捷控制</p></div>
              <div class="devices">
                <button class="device device-on-yellow">
                  <div class="device-top"><img class="item-img" src="icon-light.jpg" alt="" /><div class="tag-stack"><span class="status">ON</span></div></div>
                  <div class="device-copy"><div class="device-name">客厅灯</div><div class="state-word">80%</div></div>
                  <div class="control-row"><span class="muted">灯光</span><span class="switch on"></span></div>
                </button>
                <button class="device device-on-blue">
                  <div class="device-top"><img class="item-img" src="icon-ac.jpg" alt="" /><div class="tag-stack"><span class="status">ON</span></div></div>
                  <div class="device-copy"><div class="device-name">空调</div><div class="state-word">25°C</div></div>
                  <div class="control-row"><span class="muted">气候</span><span class="switch on"></span></div>
                </button>
                <button class="device device-off tone-purple">
                  <div class="device-top"><img class="item-img" src="icon-lock.jpg" alt="" /><div class="tag-stack"><span class="status">OFF</span></div></div>
                  <div class="device-copy"><div class="device-name">门锁</div><div class="state-word">已上锁</div></div>
                  <div class="control-row"><span class="muted">安全</span><span class="switch"></span></div>
                </button>
                <button class="device device-off tone-green">
                  <div class="device-top"><img class="item-img" src="icon-fan.jpg" alt="" /><div class="tag-stack"><span class="status">OFF</span></div></div>
                  <div class="device-copy"><div class="device-name">扫地机</div><div class="state-word">待机</div></div>
                  <div class="control-row"><span class="muted">清洁</span><span class="switch"></span></div>
                </button>
                <button class="device device-off tone-red">
                  <div class="device-top"><img class="item-img" src="icon-speaker.jpg" alt="" /><div class="tag-stack"><span class="status">OFF</span></div></div>
                  <div class="device-copy"><div class="device-name">音响</div><div class="state-word">暂停</div></div>
                  <div class="control-row"><span class="muted">媒体</span><span class="switch"></span></div>
                </button>
              </div>
            </section>
            <section class="bottom-block">
              <div class="section-title"><h2>房间</h2><p class="muted">视窗快照</p></div>
              <div class="rooms">
                <button class="room"><img src="room-living.jpg" alt="" /><div class="room-label"><h3>客厅</h3><p class="muted">4 设备在线</p></div></button>
                <button class="room"><img src="room-bedroom.jpg" alt="" /><div class="room-label"><h3>卧室</h3><p class="muted">2 设备在线</p></div></button>
                <button class="room"><img src="room-kitchen.jpg" alt="" /><div class="room-label"><h3>厨房</h3><p class="muted">3 设备在线</p></div></button>
                <button class="room"><img src="room-garden.jpg" alt="" /><div class="room-label"><h3>花园</h3><p class="muted">1 设备在线</p></div></button>
              </div>
            </section>
          </section>

          <aside class="side">
            <section class="time-card">
              <div>
                <div class="time-main">09:00</div>
                <div class="time-sub">2026年7月2日 星期四</div>
              </div>
              <div class="time-icon">🕘</div>
            </section>
            <section class="glass-card">
              <div class="section-title"><h2>环境信息</h2></div>
              <div class="env-list">
                <div class="env-row"><span class="dot temp">🌡</span><span class="muted">室内温度</span><span class="env-value">25°C</span></div>
                <div class="env-row"><span class="dot hum">💧</span><span class="muted">湿度</span><span class="env-value">65%</span></div>
                <div class="env-row"><span class="dot pm">🍃</span><span class="muted">PM2.5</span><span class="env-value">12</span></div>
              </div>
            </section>
            <section class="glass-card panel-energy">
              <div class="section-title"><h2>今日用电</h2></div>
              <div class="energy-value">12.8<small> kWh</small></div>
              <div class="bars">
                <span class="energy-bar energy-bar-level-2"></span><span class="energy-bar energy-bar-level-3"></span><span class="energy-bar energy-bar-level-4"></span><span class="energy-bar energy-bar-level-5"></span><span class="energy-bar energy-bar-level-6"></span><span class="energy-bar energy-bar-level-7"></span><span class="energy-bar energy-bar-level-8"></span><span class="energy-bar energy-bar-level-9"></span><span class="energy-bar energy-bar-level-10"></span><span class="energy-bar energy-bar-level-6"></span><span class="energy-bar energy-bar-level-4"></span><span class="energy-bar energy-bar-level-3"></span>
              </div>
              <div class="energy-footer"><span class="muted">较昨日</span><span class="down">-8%</span></div>
            </section>
            <section class="glass-card panel-scenes">
              <div class="section-title"><h2>场景</h2><p class="muted">模式</p></div>
              <div class="scene-grid">
                <button class="scene morning"><span class="scene-icon">🌅</span>早安</button>
                <button class="scene night"><span class="scene-icon">🌙</span>晚安</button>
                <button class="scene movie"><span class="scene-icon">🎬</span>观影</button>
                <button class="scene game"><span class="scene-icon">🎮</span>游戏</button>
              </div>
            </section>
          </aside>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
