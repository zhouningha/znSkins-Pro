name: Build and Release Skins Pro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate skin list
        run: node scripts/build-skins.cjs

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Detect version change
        id: version
        run: |
          NEW_VER=$(jq -r '.version' package.json)
          OLD_VER=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
          echo "new=$NEW_VER" >> "$GITHUB_OUTPUT"
          if [ -n "$OLD_VER" ] && [ "$NEW_VER" != "$OLD_VER" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push store assets to store branch
        run: |
          STORE_DIR="$(mktemp -d)"
          cp store/*.zip "$STORE_DIR/"
          cp -r screenshots/thumbnails "$STORE_DIR/thumbnails"
          cp screenshots/registry.json "$STORE_DIR/registry.json"

          git checkout --orphan _store_push
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

          mkdir -p store screenshots/thumbnails
          cp "$STORE_DIR"/*.zip store/
          cp "$STORE_DIR/thumbnails"/* screenshots/thumbnails/
          cp "$STORE_DIR/registry.json" screenshots/registry.json

          cat > README.md << 'EOF'
# Skins Pro — Store Assets

This branch contains build artifacts for the skin store.
Pushed automatically by CI. Do not edit manually.
EOF
          git add .
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Update store artifacts [skip ci]" --allow-empty
          git push origin _store_push:store --force

          git checkout "${{ github.ref_name }}"

      - name: Commit dist assets (master only)
        if: steps.version.outputs.changed == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build dist assets [skip ci]"
          git push

      - name: Generate changelog
        if: steps.version.outputs.changed == 'true'
        id: changelog
        uses: Desmond-Dong/actions/bilingual-changelog@main
        with:
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          llm-api-url: ${{ secrets.LLM_API_URL }}
          llm-model: ${{ secrets.LLM_MODEL }}

      - name: Tag and release
        if: steps.version.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build v${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin --tags
          git push

      - name: Create Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.new }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge jsdelivr cache
        run: |
          curl -s https://purge.jsdelivr.net/gh/ha-china/Skins-Pro@store/screenshots/registry.json
